<html lang="en">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { blue: '#0A2463', sky: '#1E5EFF', red: '#D62828', dark: '#0D0D0D', mid: '#1A1A2E' },
          },
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Barlow', 'sans-serif'],

          }
        }
      }

  <style>
    * { font-family: 'Barlow', sans-serif; }
    .hero-bg {
      background: linear-gradient(135deg, #0A2463 0%, #1A1A2E 40%, #0D0D0D 100%);
    }
    .diagonal-cut {
      clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%);
    }
    .diagonal-cut-rev {
      clip-path: polygon(0 5%, 100% 0, 100% 100%, 0 100%);
    }
    .red-accent::before {
      content: '';
      display: block;
      width: 48px;
      height: 4px;
      background: #D62828;
      margin-bottom: 16px;
    }
    .nav-link {
      position: relative;
      font-weight: 600;
      letter-spacing: 0.05em;
      font-size: 0.8rem;
      text-transform: uppercase;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: #D62828;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease;

    .card-hover:hover {

    }
    .btn-primary {
      background: #D62828;
      color: white;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8rem;
      padding: 14px 32px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.1);
      transition: left 0.3s;
    }
    .btn-primary:hover::before { left: 100%; }
    .btn-primary:hover { background: #b81e1e; transform: translateY(-2px); }
    .btn-outline {
      border: 2px solid white;
      color: white;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8rem;
      padding: 12px 32px;
      transition: all 0.3s;
    }
    .btn-outline:hover { background: white; color: #0A2463; }
    .stat-card {
      border-top: 3px solid #D62828;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
    }
    .service-card {
      border-left: 4px solid #D62828;
    }
    .floating-wa {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 999;
      width: 56px;
      height: 56px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(37,211,102,0.5);
      transition: transform 0.3s;
    }
    .floating-wa:hover { transform: scale(1.1); }
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #D62828;
    }

      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in-delay { animation: fadeInUp 0.8s ease 0.2s forwards; opacity: 0; }
    .fade-in-delay-2 { animation: fadeInUp 0.8s ease 0.4s forwards; opacity: 0; }

    }
